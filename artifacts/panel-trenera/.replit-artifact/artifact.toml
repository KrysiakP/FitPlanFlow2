kind = "web"
previewPath = "/"
title = "Panel Trenera"
version = "1.0.0"
id = "artifacts/panel-trenera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22751

[services.development]
run = "pnpm --filter @workspace/panel-trenera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/panel-trenera", "run", "build" ]
publicDir = "artifacts/panel-trenera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22751"
BASE_PATH = "/"
