kind = "mobile"
previewPath = "/mobile/"
title = "Panel Trenera Mobile"
version = "1.0.0"
id = "artifacts/panel-trenera-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25367

[services.development]
run = "pnpm --filter @workspace/panel-trenera-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/panel-trenera-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/panel-trenera-mobile", "run", "serve" ]

[services.env]
PORT = "25367"
BASE_PATH = "/mobile/"
